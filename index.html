<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Grogu • The Child</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div id="cursorGlow"></div>

<div id="space">

    <div id="stars1"></div>
    <div id="stars2"></div>
    <div id="stars3"></div>

    <div id="nebula"></div>

</div>

<div id="vignette"></div>

<div id="particles"></div>

<section class="hero">

<div class="glass">

    <div class="left">

        <p class="subtitle">

            STAR WARS

        </p>

        <h1>

            GROGU

        </h1>

        <h2>

            THE CHILD

        </h2>

        <p class="description">

            Small in size.

            Infinite in power.

            Sensitive to the Force.

        </p>

        <div class="buttons">

            <button id="forceButton">

                USE THE FORCE

            </button>

            <button id="infoButton">

                LEARN MORE

            </button>

        </div>

        <div id="quote">

            "Size matters not."

        </div>

    </div>

    <div class="right">

        <div class="light"></div>

        <div class="imageContainer">

            <img
                id="grogu"
                src="img/grogu1.webp"
                alt="Grogu">

        </div>

    </div>

</div>

</section>

<div class="bottomBar">

<div class="thumb active">

<img src="img/grogu1.webp">

</div>

<div class="thumb">

<img src="img/grogu2.webp">

</div>

<div class="thumb">

<img src="img/grogu3.webp">

</div>

</div>

<div id="flash"></div>

<div id="wave"></div>

<script src="script.js"></script>

</body>

</html>
